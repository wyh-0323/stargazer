<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stargazer 占星师</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
            color: white;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }
        
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }
        
        .section {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        .section h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5em;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }
        
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-block {
            width: 100%;
        }
        
        .chart-container {
            margin: 20px 0;
            text-align: center;
        }
        
        .chart-image {
            max-width: 100%;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .chat-container {
            height: 400px;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            overflow-y: auto;
            margin-bottom: 15px;
            background: #f9f9f9;
        }
        
        .message {
            margin-bottom: 15px;
            padding: 10px 15px;
            border-radius: 18px;
            max-width: 80%;
        }
        
        .user-message {
            background: #e3f2fd;
            align-self: flex-end;
            margin-left: auto;
            border-bottom-right-radius: 5px;
        }
        
        .ai-message {
            background: #f1f0f0;
            align-self: flex-start;
            border-bottom-left-radius: 5px;
        }
        
        .chat-input {
            display: flex;
            gap: 10px;
        }
        
        .chat-input input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        
        .feedback-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #ddd;
        }
        
        .feedback-options {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        
        .feedback-btn {
            padding: 8px 16px;
            border: 1px solid #ddd;
            border-radius: 20px;
            background: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .feedback-btn:hover {
            background: #f0f0f0;
        }
        
        .feedback-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        
        .premium-section {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }
        
        .premium-section h3 {
            margin-bottom: 10px;
        }
        
        .premium-section p {
            margin-bottom: 15px;
        }
        
        .premium-btn {
            background: white;
            color: #f5576c;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
        }
        
        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            
            .form-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>✨ Stargazer</h1>
            <p>你的专属占星师</p>
        </div>
        
        <div class="main-content">
            <div class="section">
                <h2>📝 个人信息</h2>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="birthDate">出生日期</label>
                        <input type="date" id="birthDate" required>
                    </div>
                    <div class="form-group">
                        <label for="birthTime">出生时间</label>
                        <input type="time" id="birthTime" required>
                    </div>
                    <div class="form-group">
                        <label for="birthProvince">出生省份</label>
                        <select id="birthProvince" required>
                            <option value="">请选择</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="birthCity">出生城市</label>
                        <select id="birthCity" required>
                            <option value="">请选择</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="birthDistrict">出生区县</label>
                        <select id="birthDistrict" required>
                            <option value="">请选择</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="currentProvince">现居省份</label>
                        <select id="currentProvince" required>
                            <option value="">请选择</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="currentCity">现居城市</label>
                        <select id="currentCity" required>
                            <option value="">请选择</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="currentDistrict">现居区县</label>
                        <select id="currentDistrict" required>
                            <option value="">请选择</option>
                        </select>
                    </div>
                </div>
                <button class="btn btn-block" onclick="generateChart()">生成星盘</button>
            </div>
            
            <div class="section">
                <h2>🌟 星盘展示</h2>
                <div class="chart-container">
                    <img id="chartImage" class="chart-image" src="" alt="星盘图" style="display: none;">
                    <p id="chartLoading" style="display: none;">正在生成星盘...</p>
                    <p id="chartError" style="display: none; color: red;">星盘生成失败，请检查输入信息</p>
                </div>
                <div class="chart-type">
                    <h3>星盘类型</h3>
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="chartType">选择星盘类型</label>
                            <select id="chartType">
                                <option value="natal">本命盘</option>
                                <option value="transit">推运盘</option>
                                <option value="synastry">比较盘</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="transitDate">推运日期</label>
                            <input type="date" id="transitDate">
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="main-content">
            <div class="section">
                <h2>💬 占星咨询</h2>
                <div class="chat-container" id="chatContainer"></div>
                <div class="chat-input">
                    <input type="text" id="chatInput" placeholder="请输入您的问题..." onkeypress="if(event.key === 'Enter') sendMessage()">
                    <button class="btn" onclick="sendMessage()">发送</button>
                </div>
                
                <div class="feedback-section">
                    <h3>💡 反馈</h3>
                    <p>对AI的回答满意吗？</p>
                    <div class="feedback-options">
                        <button class="feedback-btn" onclick="submitFeedback('satisfied')">满意</button>
                        <button class="feedback-btn" onclick="submitFeedback('neutral')">一般</button>
                        <button class="feedback-btn" onclick="submitFeedback('unsatisfied')">不满意</button>
                    </div>
                </div>
            </div>
            
            <div class="section">
                <h2>💰 专业咨询</h2>
                <div class="premium-section">
                    <h3>需要深度解读？</h3>
                    <p>AI无法回答的复杂问题，由专业占星师为您提供一对一咨询服务</p>
                    <ul style="margin-bottom: 15px;">
                        <li>深度命盘分析</li>
                        <li>职业发展规划</li>
                        <li>感情关系解读</li>
                        <li>人生重大决策指导</li>
                    </ul>
                    <button class="premium-btn" onclick="showPayment()">立即预约专业咨询</button>
                </div>
                
                <div style="margin-top: 20px;">
                    <h3>服务价格</h3>
                    <div style="margin: 15px 0;">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                            <span>30分钟咨询</span>
                            <span>¥299</span>
                        </div>
                        <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                            <span>60分钟咨询</span>
                            <span>¥499</span>
                        </div>
                        <div style="display: flex; justify-content: space-between;">
                            <span>90分钟咨询</span>
                            <span>¥699</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div id="paymentModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center;">
        <div style="background: white; padding: 30px; border-radius: 15px; width: 90%; max-width: 500px;">
            <h3>预约专业咨询</h3>
            <div class="form-group">
                <label for="consultationType">咨询类型</label>
                <select id="consultationType">
                    <option value="30min">30分钟咨询 - ¥299</option>
                    <option value="60min">60分钟咨询 - ¥499</option>
                    <option value="90min">90分钟咨询 - ¥699</option>
                </select>
            </div>
            <div class="form-group">
                <label for="contactInfo">联系方式</label>
                <input type="text" id="contactInfo" placeholder="请输入您的微信或手机号">
            </div>
            <div class="form-group">
                <label for="consultationDate">预约日期</label>
                <input type="date" id="consultationDate">
            </div>
            <div class="form-group">
                <label for="consultationTime">预约时间</label>
                <input type="time" id="consultationTime">
            </div>
            <div class="form-group">
                <label for="consultationTopic">咨询主题</label>
                <input type="text" id="consultationTopic" placeholder="请简要描述您想咨询的问题">
            </div>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button class="btn" style="flex: 1;" onclick="processPayment()">确认支付</button>
                <button class="btn" style="flex: 1; background: #ccc;" onclick="closePayment()">取消</button>
            </div>
        </div>
    </div>
    
    <script src="cities.js"></script>
    <script src="app.js"></script>
</body>
</html>
